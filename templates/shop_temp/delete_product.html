{% extends "main_temp/base.html" %}
{% load static %}


{% block content %}
<main class="max-w-4xl mx-auto py-10 px-6">
    <div class="bg-white shadow-md rounded-lg p-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-6">Підтвердження видалення товару</h2>

        <!-- Превью товара -->
        <div class="flex flex-col md:flex-row items-center gap-6 border p-4 rounded mb-6">
            {% if product.images.all %}
                <img src="{{ product.images.first.image.url }}" alt="Зображення товару" class="w-48 h-32 object-cover rounded shadow">
            {% else %}
                <img src="https://via.placeholder.com/200x150" alt="Зображення товару" class="w-48 h-32 object-cover rounded shadow">
            {% endif %}

            <div>
                <h3 class="text-lg font-semibold text-gray-900">{{ product.name }}</h3>
                <p class="text-sm text-gray-500 mt-1">Дата створення: {{ product.date|date:"d.m.Y" }}</p>
            </div>
        </div>

        <!-- Подтверждение -->
        <form method="POST" class="flex flex-col sm:flex-row gap-4">
            {% csrf_token %}
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded shadow transition">
                ✅ Так, видалити
            </button>
            <a href="{% url 'shop:product' category_slug=product.category.slug pk=product.id product_slug=product.slug %}" 
               class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-6 py-2 rounded shadow transition text-center">
                🔙 Ні, назад
            </a>
        </form>
    </div>
</main>

{% endblock content %}
