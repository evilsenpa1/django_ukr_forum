events {
    worker_connections 1024;
}

http {
    # Типы файлов для правильной отдачи CSS/JS
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Безопасность
    server_tokens off;

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Оптимизация
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Защита от медленных атак
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    client_max_body_size 75M;
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Upstream к Django+Gunicorn
    resolver 127.0.0.11 valid=30s ipv6=off; 
    
    upstream django_backend {
        # 'web' — имя сервиса из docker-compose
        server web:8000;
    }

    server {
        listen 80;
        server_name ukrkolo.site www.ukrkolo.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }


    server {
        listen 443 ssl;
        server_name ukrkolo.site www.ukrkolo.site;  # Замените на ваш домен

        ssl_certificate     /etc/letsencrypt/live/ukrkolo.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ukrkolo.site/privkey.pem;
        
        charset utf-8;
        client_max_body_size 75M;

        # ---- Security Headers ----
        include /etc/nginx/snippets/security-headers.conf;

        proxy_set_header X-Original-URL "";
        proxy_set_header X-Rewrite-URL "";
        proxy_set_header X-Forwarded-URL "";



        # Статические файлы Django (CSS, JS, admin)
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            include /etc/nginx/snippets/security-headers.conf;
        }

        # Медиа файлы (загруженные пользователями)
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
            include /etc/nginx/snippets/security-headers.conf;
        }
        
        #Closing health requests from outside
        location /health/ {
            access_log off;  # Не захламляем логи
    
            # Разрешаем Docker сети
            allow 172.16.0.0/12;  # Диапазон Docker по умолчанию
            deny all;
    
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
        }

        # Все остальные запросы → Django
        location / {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors off;
            
            # Таймауты
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}