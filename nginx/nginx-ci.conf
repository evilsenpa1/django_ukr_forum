# CI-only nginx config — no SSL, serves directly on HTTP port 80.
# The production config (nginx.conf) uses HTTPS with Let's Encrypt certificates
# that are unavailable in CI, and its port-80 server only issues 301 redirects.
#
# Paths CI_STATIC_PATH and CI_MEDIA_PATH are substituted by sed in the workflow.

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    sendfile on;
    client_max_body_size 75M;

    # Rate-limiting zones — mirror production settings
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    upstream django_backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name localhost;

        location /static/ {
            alias CI_STATIC_PATH/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias CI_MEDIA_PATH/;
        }

        # Apply auth rate-limiting to login endpoint, same as production
        location /users/login/ {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=auth burst=5 nodelay;
        }

        location / {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
