add_header X-Content-Type-Options       "nosniff"                                  always;
add_header X-Frame-Options              "DENY"                                     always;
add_header Referrer-Policy              "strict-origin-when-cross-origin"          always;
add_header Cross-Origin-Resource-Policy "cross-origin"                             always;
# COEP убери или замени — он ломает все внешние ресурсы
# add_header Cross-Origin-Embedder-Policy "require-corp"                           always;
add_header Cross-Origin-Opener-Policy   "same-origin"                              always;
add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;