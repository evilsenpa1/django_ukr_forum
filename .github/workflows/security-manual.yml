name: Manual Security Scans

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  SECRET_KEY: "dummy-ci-secret-key"
  HASHIDS_SALT: "dummy-ci-hashids-salt-for-testing"
  ALLOWED_HOSTS: "localhost,127.0.0.1"

jobs:

  # ==========================================================
  # NIGHTLY FULL DAST
  # ==========================================================
  nightly-dast:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      checks: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: config.settings
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt gunicorn
          sudo apt-get update -qq
          sudo apt-get install -y nginx redis-tools jq

      - name: Wait for Postgres
        run: |
          until pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER; do
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Wait for Redis
        run: |
          until redis-cli -h localhost -p 6379 ping | grep -q PONG; do
            echo "Waiting for Redis..."
            sleep 2
          done

      - name: Migrate DB
        run: python manage.py migrate

      - name: Collect static
        run: python manage.py collectstatic --noinput

      - name: Start Gunicorn
        run: |
          nohup gunicorn config.wsgi:application \
            --bind 127.0.0.1:8000 \
            --workers 2 \
            --log-file /tmp/gunicorn.log \
            --error-logfile /tmp/gunicorn-error.log &
          GUNICORN_PID=$!
          echo "Waiting for Gunicorn (PID $GUNICORN_PID)..."
          for i in {1..20}; do
            if curl -sf http://127.0.0.1:8000/ > /dev/null 2>&1; then
              echo "Gunicorn is up after $i attempts"
              exit 0
            fi
            if ! kill -0 $GUNICORN_PID 2>/dev/null; then
              echo "❌ Gunicorn process died!"
              cat /tmp/gunicorn-error.log
              exit 1
            fi
            echo "Attempt $i — waiting..."
            sleep 2
          done
          echo "❌ Gunicorn did not start in time"
          cat /tmp/gunicorn-error.log
          exit 1

      - name: Configure & start nginx
        run: |
          STATIC_PATH="${{ github.workspace }}/staticfiles"
          MEDIA_PATH="${{ github.workspace }}/media"

          sudo mkdir -p /etc/nginx/snippets
          sudo cp ${{ github.workspace }}/nginx/snippets/security-headers.conf \
                  /etc/nginx/snippets/security-headers.conf

          # Use the CI-specific config — the production nginx.conf uses HTTPS/SSL
          # and redirects port 80 to 443, both of which fail in CI without certs.
          sed \
            -e "s|CI_STATIC_PATH|${STATIC_PATH}|g" \
            -e "s|CI_MEDIA_PATH|${MEDIA_PATH}|g" \
            nginx/nginx-ci.conf | sudo tee /etc/nginx/nginx.conf

          echo "=== Testing nginx config ==="
          sudo nginx -t

          sudo systemctl stop nginx || true
          sudo systemctl start nginx
          sudo systemctl status nginx --no-pager || true

          if ! sudo systemctl is-active --quiet nginx; then
            echo "=== Nginx failed to start, error log: ==="
            sudo cat /var/log/nginx/error.log || echo "No error log"
            exit 1
          fi

      - name: Wait for nginx
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:80 > /dev/null; then
              echo "nginx is up"
              exit 0
            fi
            echo "Attempt $i — waiting..."
            sleep 2
          done
          echo "nginx failed to start, dumping logs:"
          sudo journalctl -u nginx --no-pager -n 30 || true
          cat /tmp/gunicorn-error.log || true
          exit 1

      - name: ZAP Full Scan
        # Full scan = active scanning (attack simulation), unlike baseline
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:80'
          cmd_options: '-d'
          rules_file_name: '.zap/rules-full.tsv'
          fail_action: true

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs-nightly
          path: |
            /tmp/gunicorn.log
            /tmp/gunicorn-error.log


  # ==========================================================
  # WEEKLY DEPENDENCY AUDIT
  # ==========================================================
  weekly-dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Run dependency audit
        # BUG FIX: pip-audit JSON does not include a "severity" field — the old
        # filter `select(.severity=="high"...)` always returned 0, making the check
        # completely ineffective. Count all vulnerabilities regardless of severity.
        run: |
          pip-audit -r requirements.txt -f json -o audit-report.json; AUDIT_STATUS=$?
          jq '.' audit-report.json

          VULNS=$(jq '[.dependencies[].vulns[]] | length' audit-report.json)

          if [ "$VULNS" -gt 0 ]; then
            echo "❌ Found $VULNS vulnerabilit(ies) in dependencies!"
            exit 1
          else
            echo "✅ No vulnerabilities found."
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: audit-report.json
